---
layout: default
title: Contact
---

<section class="contact-section">
  <h2>Contact</h2>
  <p>Use this form for questions, feedback, or data deletion requests for any of my projects.</p>

  <form
    name="contact"
    method="POST"
    data-netlify="true"
    netlify-honeypot="bot-field"
    action="/thanks/"
    class="contact-form"
  >
    <input type="hidden" name="form-name" value="contact">

    <p class="sr-only">
      <label>Don't fill this out if you're human: <input name="bot-field"></label>
    </p>

    <div class="contact-field">
      <label for="contact-name">Name</label>
      <input type="text" id="contact-name" name="name" placeholder="Your name" autocomplete="name">
    </div>

    <div class="contact-field">
      <label for="contact-email">Email <span class="required">*</span></label>
      <input type="email" id="contact-email" name="email" placeholder="your@email.com" required autocomplete="email">
    </div>

    <div class="contact-field">
      <label for="contact-subject">Subject</label>
      <select id="contact-subject" name="subject">
        <option value="general">General question</option>
        <option value="data-deletion">Data deletion request</option>
        <option value="bug">Bug report</option>
        <option value="feedback">Feedback</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="contact-field">
      <label for="contact-message">Message <span class="required">*</span></label>
      <textarea id="contact-message" name="message" rows="5" placeholder="Your message..." required></textarea>
    </div>

    <button type="submit" class="contact-submit">Send Message</button>
  </form>
</section>

<style>
  .contact-section {
    max-width: 560px;
  }

  .contact-section h2 {
    margin-bottom: 8px;
  }

  .contact-section > p {
    margin-bottom: 28px;
    color: #555;
  }

  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .contact-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .contact-field label {
    font-size: 14px;
    font-weight: 600;
    color: #333;
  }

  .required {
    color: #c00;
  }

  .contact-field input,
  .contact-field select,
  .contact-field textarea {
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    color: #111;
    transition: border-color 0.15s;
    width: 100%;
    box-sizing: border-box;
  }

  .contact-field input:focus,
  .contact-field select:focus,
  .contact-field textarea:focus {
    outline: none;
    border-color: #555;
  }

  .contact-field textarea {
    resize: vertical;
    min-height: 120px;
  }

  .contact-submit {
    align-self: flex-start;
    padding: 11px 28px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }

  .contact-submit:hover {
    background: #333;
  }
</style>
