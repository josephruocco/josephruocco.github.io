<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body>

    <!-- Removed sidebar -->

    <div class="wrap">
      <div class="masthead">
        <div class="container masthead-inner">
          <a class="masthead-avatar-link" href="/" title="Home" aria-label="Home">
            <img class="masthead-avatar" src="/assets/avatar.jpg" alt="Joseph Ruocco" width="48" height="48">
          </a>
          <h3 class="masthead-title">
             <a href="/" title="Home">Joseph Ruocco</a>
          </h3>
        </div>
      </div>

      <div class="container content">
        {{ content }}

        {% include footer.html %}
      </div>
    </div>

    <div class="project-lightbox" id="project-lightbox" hidden>
      <button class="project-lightbox-close" type="button" aria-label="Close image viewer">&times;</button>
      <img class="project-lightbox-image" id="project-lightbox-image" alt="">
    </div>

    <script>
      (() => {
        const lightbox = document.getElementById("project-lightbox");
        const image = document.getElementById("project-lightbox-image");
        const closeButton = lightbox?.querySelector(".project-lightbox-close");

        if (!lightbox || !image || !closeButton) return;

        const closeLightbox = () => {
          lightbox.hidden = true;
          image.removeAttribute("src");
          image.alt = "";
          document.body.classList.remove("project-lightbox-open");
        };

        document.addEventListener("click", (event) => {
          const trigger = event.target.closest("[data-project-lightbox]");
          if (trigger) {
            event.preventDefault();
            image.src = trigger.getAttribute("href");
            image.alt = trigger.getAttribute("data-lightbox-alt") || "";
            lightbox.hidden = false;
            document.body.classList.add("project-lightbox-open");
            return;
          }

          if (event.target === lightbox || event.target === closeButton) {
            closeLightbox();
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !lightbox.hidden) {
            closeLightbox();
          }
        });
      })();
    </script>

    <!-- Removed sidebar toggle + script -->

  </body>
</html>
